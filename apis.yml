aid: html
name: HTML
description: >-
  HTML (HyperText Markup Language) is the standard markup language for
  creating web pages and web applications. Maintained as a Living Standard
  by WHATWG and developed in close coordination with the W3C, HTML defines
  the structure and semantics of web content alongside CSS for presentation
  and JavaScript for behavior. The current specification covers semantic
  elements, multimedia (audio, video, picture, track), the canvas API,
  forms with rich input types and validation, web storage, custom elements,
  the dialog and popover patterns, and a broad set of DOM and document
  conformance rules. This index covers HTML-related standards,
  specifications, references, and resources relevant to API designers and
  web developers building on top of HTTP.
